<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrategia 15 Contenidos - Grupo Mi Panadería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf7f2;
            color: #4a3728;
        }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); border-color: #d97706; box-shadow: 0 15px 30px -10px rgba(120, 53, 15, 0.2); }
        
        .tag-tofu { background-color: #dcfce7; color: #166534; }
        .tag-mofu { background-color: #fef9c3; color: #854d0e; }
        .tag-bofu { background-color: #fee2e2; color: #991b1b; }
        
        .type-reel { border-left: 4px solid #8b5cf6; }
        .type-carrusel { border-left: 4px solid #3b82f6; }
        .type-estatico { border-left: 4px solid #10b981; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6 border-b border-amber-200 pb-10">
            <div>
                <span class="bg-amber-100 text-amber-800 text-xs font-black px-3 py-1 rounded-full uppercase tracking-widest mb-2 inline-block">Estrategia Mayo: 15 Contenidos</span>
                <h1 class="text-5xl font-bold text-amber-900 leading-tight">Plan Maestro Mayo 🍗</h1>
                <p class="text-amber-700 text-lg mt-2 italic">"Contemplación, sabor y familia en Judibana"</p>
            </div>
            <div class="flex gap-3">
                <div class="text-right">
                    <p class="text-[10px] font-black uppercase text-amber-900/40">Resumen de Formatos</p>
                    <p class="text-sm font-bold text-amber-900">5 Reels | 6 Carruseles | 4 Estáticos</p>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="bg-purple-100 p-4 rounded-2xl border border-purple-200">
                <span class="block text-2xl font-black text-purple-900">5</span>
                <span class="text-[10px] uppercase font-bold text-purple-700">Reels Contemplativos</span>
            </div>
            <div class="bg-blue-100 p-4 rounded-2xl border border-blue-200">
                <span class="block text-2xl font-black text-blue-900">6</span>
                <span class="text-[10px] uppercase font-bold text-blue-700">Carruseles Educativos/Venta</span>
            </div>
            <div class="bg-green-100 p-4 rounded-2xl border border-green-200">
                <span class="block text-2xl font-black text-green-900">4</span>
                <span class="text-[10px] uppercase font-bold text-green-700">Post Estáticos Impacto</span>
            </div>
            <div class="bg-amber-100 p-4 rounded-2xl border border-amber-200">
                <span class="block text-2xl font-black text-amber-900">100%</span>
                <span class="text-[10px] uppercase font-bold text-amber-700">Estrategia Integrada</span>
            </div>
        </div>

        <!-- Filters -->
        <div class="mb-8 flex gap-2 overflow-x-auto pb-2">
            <button onclick="filterType('all')" class="px-4 py-2 bg-amber-900 text-white rounded-xl text-xs font-bold">Todos</button>
            <button onclick="filterType('Reel')" class="px-4 py-2 bg-white text-amber-900 border border-amber-200 rounded-xl text-xs font-bold">Reels</button>
            <button onclick="filterType('Carrusel')" class="px-4 py-2 bg-white text-amber-900 border border-amber-200 rounded-xl text-xs font-bold">Carruseles</button>
            <button onclick="filterType('Estatico')" class="px-4 py-2 bg-white text-amber-900 border border-amber-200 rounded-xl text-xs font-bold">Estáticos</button>
        </div>

        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Content will be injected here -->
        </div>
    </div>

    <!-- Simple Detail Modal -->
    <div id="detail-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-[32px] p-8 max-w-lg w-full shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-amber-900/40 hover:text-amber-900"><i class="fas fa-times-circle text-xl"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const content = [
            // REELS (5)
            { id: 1, week: 1, type: 'tofu', format: 'Reel', title: 'El Ritual del Chicharrón', desc: 'VISUAL: Plano Medio minimalista sobre mesa de madera. Vapor ligero. \nTEXTO: "Pequeños placeres... que suenan así." \nPRECIO: 7.50$ en esquina elegante.', icon: 'fa-play' },
            { id: 2, week: 1, type: 'tofu', format: 'Reel', title: 'Anatomía: Combo Burger', desc: 'VISUAL: COMBO BURGER FAMILIAR 14$. \nUna toma cenital (desde arriba) donde se vean las 5 hamburguesas dispuestas en círculo, con la Pepsi de 1.5 Lts en el centro. Debe verse masivo. \nAUDIO: + Música épica suave.', icon: 'fa-play' },
            { id: 3, week: 2, type: 'mofu', format: 'Reel', title: 'El Mejor Café de Judibana', desc: 'VISUAL: El café cayendo en la taza blanca desde la cafetera \nAUDIO: Jazz suave / Lo-fi. \nTEXTO: Colores tierra, madera, ambiente acogedor. \n"Hay cosas que no se explican, se sienten.", icon: 'fa-play' },
            { id: 4, week: 3, type: 'bofu', format: 'Reel', title: 'Arquitectura: Combo Perros', desc: 'VISUAL: 8 Perros en plano cenital y transcicion a planos detalle. \n8 clásicos listos para entrar en acción. \n Etiqueta a tu equipo de maratón. Pide el tuyo al DM.\nAUDIO: Sonidos rítmicos "pop" con cada corte', icon: 'fa-play' },
            { id: 5, week: 4, type: 'bofu', format: 'Reel', title: 'Una Opción de lujo', desc: 'VISUAL: "Una opción de lujo, Hoy les presente la parripapa de grupo mi panadería, Una total exquisitez"', icon: 'fa-play' },

            // CARRUSELES (6)
            { id: 6, week: 1, type: 'mofu', format: 'Carrusel', title: 'Menú Pizzas: Guía de Selección', desc: 'Slide 1: Foto brutal de la Margarita (4$). \nSlide 2: Especial Mi Panadería (8$). \nSlide 3: Promoción 2 pizzas x 15$. \nSlide 4: Mapa de Judibana.', icon: 'fa-clone' },
            { id: 7, week: 2, type: 'mofu', format: 'Carrusel', title: 'Especial Día de las Madres', desc: 'Slide 1: Portada emotiva "Mamá merece lo mejor". \nSlide 2: Pollo a la Suiza (5.99$). \nSlide 3: Solomo al Ajillo (7.50$). \nSlide 4: Reserva tu mesa.', icon: 'fa-clone' },
            { id: 8, week: 2, type: 'bofu', format: 'Carrusel', title: 'Combos Familiares de Pollo', desc: 'Slide 1: Combo 1 (Pollo entero + acompañantes - 14$). \nSlide 2: Combo 2 (1.5 pollos - 19$). \nSlide 3: El Mega (2 pollos - 25$). \nSlide 4: CTA: Pídelo para llevar.', icon: 'fa-clone' },
            { id: 9, week: 3, type: 'mofu', format: 'Carrusel', title: 'Nuestros Almuerzos Criollos', desc: 'Slide 1: Pabellón Criollo en detalle. \nSlide 2: Milanesa de Pollo. \nSlide 3: Chuleta Ahumada. \nSlide 4: Todos incluyen sopa del día.', icon: 'fa-clone' },
            { id: 10, week: 4, type: 'tofu', format: 'Carrusel', title: 'Secretos de nuestra Panadería', desc: 'Slide 1: El pan saliendo del horno. \nSlide 2: Ingredientes de primera. \nSlide 3: Tradición en Judibana. \nSlide 4: ¿Ya probaste el pan de jamón?', icon: 'fa-clone' },
            { id: 11, week: 4, type: 'bofu', format: 'Carrusel', title: 'Menú Nocturno: Cena con nosotros', desc: 'Slide 1: Perros, Burgers y Pizzas. \nSlide 2: Menú de bebidas. \nSlide 3: Ambiente de la terraza nocturna. \nSlide 4: Horarios de atención.', icon: 'fa-clone' },

            // ESTATICOS (4)
            { id: 12, week: 1, type: 'tofu', format: 'Estatico', title: 'La Arepa Maracucha', desc: 'Foto única de alto impacto. Foco total en el queso derretido y el relleno abundante. Sin mucho texto.', icon: 'fa-image' },
            { id: 13, week: 2, type: 'mofu', format: 'Estatico', title: 'Tradición de Domingo', desc: 'Foto de una familia compartiendo un combo de pollo en nuestras mesas. Captura de momento real.', icon: 'fa-image' },
            { id: 14, week: 3, type: 'bofu', format: 'Estatico', title: 'Promo: El Almuerzo Ejecutivo', desc: 'Diseño limpio: Plato del día + Sopa + Bebida por un precio único visible.', icon: 'fa-image' },
            { id: 15, week: 4, type: 'tofu', format: 'Estatico', title: 'Atardecer en Judibana', desc: 'Foto de la fachada o terraza con el cielo naranja. "El mejor café, la mejor vista".', icon: 'fa-image' }
        ];

        function render(filter = 'all') {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? content : content.filter(item => item.format === filter);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `card bg-white p-6 rounded-[24px] border border-amber-100/50 shadow-sm cursor-pointer flex flex-col type-${item.format.toLowerCase()}`;
                card.onclick = () => showDetail(item.id);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black uppercase text-amber-900/30 tracking-widest">Semana ${item.week}</span>
                        <span class="px-3 py-1 rounded-full text-[10px] font-black tag-${item.type}">${item.type.toUpperCase()}</span>
                    </div>
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-8 h-8 rounded-lg bg-amber-50 flex items-center justify-center text-amber-900 text-xs">
                            <i class="fas ${item.icon}"></i>
                        </div>
                        <h3 class="font-bold text-amber-950">${item.title}</h3>
                    </div>
                    <p class="text-xs text-amber-900/60 line-clamp-2 italic leading-relaxed">"${item.desc}"</p>
                `;
                grid.appendChild(card);
            });
        }

        function showDetail(id) {
            const item = content.find(p => p.id === id);
            const modal = document.getElementById('detail-modal');
            const container = document.getElementById('modal-content');
            
            container.innerHTML = `
                <div class="flex items-center gap-3 mb-6">
                    <span class="px-4 py-1 bg-amber-100 text-amber-800 rounded-full text-[10px] font-black uppercase">${item.format}</span>
                    <span class="text-xs text-amber-900/40 font-bold">Semana ${item.week}</span>
                </div>
                <h2 class="text-3xl font-bold text-amber-950 mb-4">${item.title}</h2>
                <div class="bg-amber-50 p-6 rounded-2xl mb-6">
                    <p class="text-sm text-amber-900/80 leading-relaxed whitespace-pre-line">${item.desc}</p>
                </div>
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-black uppercase text-amber-900/30 tracking-widest">Objetivo: ${item.type.toUpperCase()}</p>
                    <button onclick="closeModal()" class="text-sm font-bold text-amber-900">Entendido</button>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        function filterType(type) {
            render(type);
        }

        window.onload = () => render();
    </script>
</body>
</html>
