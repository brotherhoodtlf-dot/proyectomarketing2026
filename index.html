<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrategia 15 Contenidos - Grupo Mi Panadería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #eff6ff;
            color: #1e3a8a;
        }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); border-color: #2563eb; box-shadow: 0 15px 30px -10px rgba(37, 99, 235, 0.2); }
        
        .tag-tofu { background-color: #dbeafe; color: #1d4ed8; }
        .tag-mofu { background-color: #bfdbfe; color: #1e40af; }
        .tag-bofu { background-color: #e0f2fe; color: #0369a1; }
        
        .type-reel { border-left: 4px solid #3b82f6; }
        .type-carrusel { border-left: 4px solid #2563eb; }
        .type-estatico { border-left: 4px solid #0ea5e9; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e0f2fe; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6 border-b border-sky-200 pb-10">
            <div>
                <span class="bg-sky-100 text-sky-800 text-xs font-black px-3 py-1 rounded-full uppercase tracking-widest mb-2 inline-block">Estrategia Mayo: 15 Contenidos</span>
                <h1 class="text-5xl font-bold text-sky-950 leading-tight">Plan Maestro Mayo</h1>
                <p class="text-sky-700 text-lg mt-2 italic">"Contemplación, sabor y familia en Judibana"</p>
            </div>
            <div class="flex gap-3">
                <div class="text-right">
                    <p class="text-[10px] font-black uppercase text-sky-900/40">Resumen de Formatos</p>
                    <p class="text-sm font-bold text-sky-900">5 Reels | 6 Carruseles | 4 Estáticos</p>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="bg-sky-100 p-4 rounded-2xl border border-sky-200">
                <span class="block text-2xl font-black text-sky-900">5</span>
                <span class="text-[10px] uppercase font-bold text-sky-700">Reels Contemplativos</span>
            </div>
            <div class="bg-cyan-100 p-4 rounded-2xl border border-cyan-200">
                <span class="block text-2xl font-black text-cyan-900">6</span>
                <span class="text-[10px] uppercase font-bold text-cyan-700">Carruseles Educativos/Venta</span>
            </div>
            <div class="bg-blue-100 p-4 rounded-2xl border border-blue-200">
                <span class="block text-2xl font-black text-blue-900">4</span>
                <span class="text-[10px] uppercase font-bold text-blue-700">Post Estáticos Impacto</span>
            </div>
            <div class="bg-indigo-100 p-4 rounded-2xl border border-indigo-200">
                <span class="block text-2xl font-black text-indigo-900">100%</span>
                <span class="text-[10px] uppercase font-bold text-indigo-700">Estrategia Integrada</span>
            </div>
        </div>

        <!-- Filters -->
        <div class="mb-8 flex gap-2 overflow-x-auto pb-2">
            <button onclick="filterType('all')" class="px-4 py-2 bg-sky-900 text-white rounded-xl text-xs font-bold">Todos</button>
            <button onclick="filterType('Reel')" class="px-4 py-2 bg-white text-sky-900 border border-sky-200 rounded-xl text-xs font-bold">Reels</button>
            <button onclick="filterType('Carrusel')" class="px-4 py-2 bg-white text-sky-900 border border-sky-200 rounded-xl text-xs font-bold">Carruseles</button>
            <button onclick="filterType('Estatico')" class="px-4 py-2 bg-white text-sky-900 border border-sky-200 rounded-xl text-xs font-bold">Estáticos</button>
        </div>

        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Content will be injected here -->
        </div>
    </div>

    <!-- Simple Detail Modal -->
    <div id="detail-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-[32px] p-8 max-w-lg w-full shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-sky-900/40 hover:text-sky-900"><i class="fas fa-times-circle text-xl"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const content = [
            // SEMANA 1: El Arte del Detalle
            { id: 1, week: 1, type: 'tofu', format: 'Reel', title: 'El Ritual del Chicharrón', desc: 'VISUAL: Plano Medio. Se ve el plato servido, el vapor sale ligeramente del chicharrón crujiente.\nTEXTO: "Pequeños placeres... que suenan así."\nDato Clave: Mostrar precio de 7.50$ en una esquina con tipografía elegante.\nAUDIO: rock no copyright', icon: 'fa-play' },
            { id: 2, week: 1, type: 'mofu', format: 'Carrusel', title: 'Menú de Pizzas: Guía de Selección', desc: 'Slide 1: Foto de la Pizza Margarita (4$).\nSlide 2: Especial Mi Panadería con todos los ingredientes (8$).\nSlide 3: Promoción 2 pizzas x 15$ (ideal para compartir).\nSlide 4: Mapa de ubicación en Judibana.', icon: 'fa-clone' },
            { id: 3, week: 1, type: 'tofu', format: 'Reel', title: 'La Arepa Maracucha', desc: 'Concepto: De una montaña se hace la transición a la arepa maracucha, se muestra grande e imponente.\nCopy: "La reina de la mañana ¿Con qué la acompañas hoy?"', icon: 'fa-play' },
            { id: 4, week: 1, type: 'mofu', format: 'Reel', title: 'Anatomía: Combo Burger', desc: 'VISUAL: Armado lento de la burger de 14$. Carne soltando jugos en la plancha, queso fundiéndose.\nAUDIO: Música cinematográfica épica pero de volumen bajo.', icon: 'fa-play' },

            // SEMANA 2: Momentos en Familia
            { id: 5, week: 2, type: 'bofu', format: 'Carrusel', title: 'Especial Día de las Madres', desc: 'Slide 1: Portada emotiva: "Mamá merece los sabores que ama".\nSlide 2: Pollo crispy (5.99$) - La opción elegante.\nSlide 3: Solomo al Ajillo (7.50$) - Para un almuerzo especial.\nSlide 4: Botón de reserva o pedido.', icon: 'fa-clone' },
            { id: 6, week: 2, type: 'tofu', format: 'Reel', title: 'El Mejor Café de Judibana', desc: 'VISUAL: Macro/Slow Mo: El chorro de café golpeando el fondo de la taza. Queremos ver las burbujas doradas (la crema) formándose.\n"El mundo puede esperar...""...tu café no.""Hay cosas que no se explican, se sienten." Fade out elegante. el mejor café de Judibana te espera.\nAUDIO: Jazz suave o Lo-fi.', icon: 'fa-play' },
            { id: 7, week: 2, type: 'mofu', format: 'Estatico', title: 'Tradición de Domingo', desc: 'Concepto: Foto de una familia real compartiendo en las mesas del local.\nMensaje: "Más que comida, creamos recuerdos en Judibana."', icon: 'fa-image' },
            { id: 8, week: 2, type: 'bofu', format: 'Carrusel', title: 'Combos Familiares de Pollo', desc: 'Slide 1: Combo 1 (Pollo entero + acompañantes) - 14$.\nSlide 2: Combo 2 (1.5 pollos) - 19$.\nSlide 3: El Mega Combo (2 pollos) - 25$.\nSlide 4: Llamado a la acción: "Pídelo para llevar".', icon: 'fa-clone' },

            // SEMANA 3: Sabor que Alimenta
            { id: 9, week: 3, type: 'mofu', format: 'Carrusel', title: 'Nuestros Almuerzos Criollos', desc: 'Slide 1: Pabellón Criollo servido de forma artística.\nSlide 2: Milanesa de Pollo crujiente.\nSlide 3: Chuleta Ahumada.\nSlide 4: "Todos nuestros platos incluyen la sopa del día".', icon: 'fa-clone' },
            { id: 10, week: 3, type: 'bofu', format: 'Reel', title: 'El Elenco Perfecto: Combo Perros', desc: 'VISUAL: "El único equipo que nunca te falla."\nSubtítulo: 8 clásicos listos para entrar en acción.\nAUDIO: Sonidos rítmicos "pop" con cada corte de transición.\nDato: Etiqueta a tu equipo de maratón. Pide el tuyo al DM.', icon: 'fa-play' },
            { id: 11, week: 3, type: 'bofu', format: 'Estatico', title: 'Promo: ¡EL DUO PERFECTO! 🍕🍕', desc: 'Usa una fotografía de alta calidad donde se vean las dos pizzas personales con el queso derretido y los ingredientes resaltando.\nAl lado, coloca la botella de refresco de 1Lt con gotas de frío (condensación).\nElemento de Oferta: Un círculo o "sticker" llamativo en una esquina con el precio: 13$.\nTexto secundario (Parte inferior): * "2 Pizzas personales (3 ingredientes a elegir) + Refresco 1Lt."', icon: 'fa-image' },

            // SEMANA 4: Experiencia Mi Panadería
            { id: 12, week: 4, type: 'tofu', format: 'Carrusel', title: '¿Sabías cual es la pausa perfecta en Judibana?', desc: 'Slide 1: Un primer plano (macro) de la boquilla de la máquina de expresso vertiendo la crema dorada en una taza. Se debe ver el vapor y la textura.\nSlide 2: No es solo café, es el arte de nuestro barista\nSlide 3: Tú dinos cómo te gusta, nuestro barista lo hace realidad. Mocca, Americano, Latte... todo tipo de café, preparado al momento.\nSlide 4: "¿Ya probaste nuestra variedad hoy?".', icon: 'fa-clone' },
            { id: 13, week: 4, type: 'bofu', format: 'Reel', title: 'Gula Elegante: Parripapa', desc: 'Una opción de lujo\nHoy les presente la parripapa de grupo mi panadería\nUna total exquisitez, pollo carne y chorizo, Full papa, full salsa\nSin duda el antojo se quedó pequeño con esta explosión de sabor\nVen por la tuya en grupo mi panadería', icon: 'fa-play' },
            { id: 14, week: 4, type: 'bofu', format: 'Carrusel', title: 'Menú Nocturno: Cena en Judibana', desc: 'Slide 1: Resumen: Perros, Burgers y Pizzas.\nSlide 2: Bebidas y acompañantes.\nSlide 3: Ambiente de la terraza de noche.', icon: 'fa-clone' },
            { id: 15, week: 4, type: 'tofu', format: 'Estatico', title: 'Atardecer en Judibana', desc: 'Concepto: Foto artística de la fachada bajo el cielo naranja de Falcón.\nCopy: "El mejor café, la mejor vista. Te esperamos."', icon: 'fa-image' }
        ];

        function render(filter = 'all') {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? content : content.filter(item => item.format === filter);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `card bg-white p-6 rounded-[24px] border border-sky-100/50 shadow-sm cursor-pointer flex flex-col type-${item.format.toLowerCase()}`;
                card.onclick = () => showDetail(item.id);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black uppercase text-sky-900/30 tracking-widest">Semana ${item.week}</span>
                        <span class="px-3 py-1 rounded-full text-[10px] font-black tag-${item.type}">${item.type.toUpperCase()}</span>
                    </div>
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-8 h-8 rounded-lg bg-sky-50 flex items-center justify-center text-sky-900 text-xs">
                            <i class="fas ${item.icon}"></i>
                        </div>
                        <h3 class="font-bold text-sky-950">${item.title}</h3>
                    </div>
                    <p class="text-xs text-sky-900/60 line-clamp-2 italic leading-relaxed">"${item.desc}"</p>
                `;
                grid.appendChild(card);
            });
        }

        function showDetail(id) {
            const item = content.find(p => p.id === id);
            const modal = document.getElementById('detail-modal');
            const container = document.getElementById('modal-content');
            
            container.innerHTML = `
                <div class="flex items-center gap-3 mb-6">
                    <span class="px-4 py-1 bg-sky-100 text-sky-800 rounded-full text-[10px] font-black uppercase">${item.format}</span>
                    <span class="text-xs text-sky-900/40 font-bold">Semana ${item.week}</span>
                </div>
                <h2 class="text-3xl font-bold text-sky-950 mb-4">${item.title}</h2>
                <div class="bg-sky-50 p-6 rounded-2xl mb-6">
                    <p class="text-sm text-sky-900/80 leading-relaxed whitespace-pre-line">${item.desc}</p>
                </div>
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-black uppercase text-sky-900/30 tracking-widest">Objetivo: ${item.type.toUpperCase()}</p>
                    <button onclick="closeModal()" class="text-sm font-bold text-sky-900">Entendido</button>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        function filterType(type) {
            render(type);
        }

        window.onload = () => render();
    </script>
</body>
</html>
