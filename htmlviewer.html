<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan de Contenido Mayo - Grupo Mi Panadería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf7f2;
            color: #4a3728;
        }
        h1, h2 {
            font-family: 'Playfair Display', serif;
        }
        .card {
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #d97706;
            box-shadow: 0 15px 30px -10px rgba(120, 53, 15, 0.2);
        }
        .tag-tofu { background-color: #dcfce7; color: #166534; }
        .tag-mofu { background-color: #fef9c3; color: #854d0e; }
        .tag-bofu { background-color: #fee2e2; color: #991b1b; }
        
        .is-reel { border-top: 6px solid #8b5cf6; }
        
        .ai-loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6 border-b border-amber-200 pb-10">
            <div class="text-left">
                <span class="bg-amber-100 text-amber-800 text-xs font-black px-3 py-1 rounded-full uppercase tracking-widest mb-2 inline-block">Estrategia Contemplativa + AI ✨</span>
                <h1 class="text-5xl font-bold text-amber-900 leading-tight">Mayo Artístico 🍗☕️</h1>
                <p class="text-amber-700 text-lg mt-2">Enfoque en detalles y calidad para <b>Grupo Mi Panadería</b>.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="generateAIPrompt()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-2xl text-sm font-bold hover:bg-indigo-700 transition-all flex items-center shadow-lg shadow-indigo-200">
                    <i class="fas fa-sparkles mr-2"></i> ✨ Idea con IA
                </button>
                <button onclick="exportData()" class="px-5 py-2.5 bg-white border-2 border-amber-900/10 rounded-2xl text-sm font-bold text-amber-900 hover:bg-amber-50 transition-all flex items-center">
                    <i class="fas fa-file-export mr-2"></i> Exportar
                </button>
            </div>
        </header>

        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-amber-100/50">
                <div class="text-amber-500 mb-2"><i class="fas fa-calendar-alt"></i></div>
                <span id="stat-total" class="block text-4xl font-black text-amber-900 leading-none mb-1">0</span>
                <span class="text-[10px] text-amber-600 font-bold uppercase tracking-widest">Publicaciones</span>
            </div>
            <div class="bg-purple-600 p-6 rounded-3xl shadow-lg shadow-purple-200">
                <div class="text-white/80 mb-2"><i class="fas fa-film"></i></div>
                <span id="stat-reels" class="block text-4xl font-black text-white leading-none mb-1">0</span>
                <span class="text-[10px] text-white/80 font-bold uppercase tracking-widest">Reels Cinematográficos</span>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-amber-100/50">
                <div class="text-green-500 mb-2"><i class="fas fa-bullseye"></i></div>
                <span id="stat-tofu" class="block text-4xl font-black text-amber-900 leading-none mb-1">0</span>
                <span class="text-[10px] text-amber-600 font-bold uppercase tracking-widest">Post Atracción</span>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-amber-100/50">
                <div class="text-red-500 mb-2"><i class="fas fa-shopping-cart"></i></div>
                <span id="stat-bofu" class="block text-4xl font-black text-amber-900 leading-none mb-1">0</span>
                <span class="text-[10px] text-amber-600 font-bold uppercase tracking-widest">Venta Directa</span>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap justify-between items-center gap-6 mb-8">
            <div class="flex gap-2 p-1.5 bg-amber-900/5 rounded-2xl">
                <button onclick="filterContent('all')" class="filter-btn active px-5 py-2 rounded-xl text-sm font-bold transition-all bg-amber-900 text-white shadow-md shadow-amber-900/20">Todos</button>
                <button onclick="filterContent('tofu')" class="filter-btn px-5 py-2 rounded-xl text-sm font-bold text-amber-900/60 hover:text-amber-900 transition-all">ToFu</button>
                <button onclick="filterContent('mofu')" class="filter-btn px-5 py-2 rounded-xl text-sm font-bold text-amber-900/60 hover:text-amber-900 transition-all">MoFu</button>
                <button onclick="filterContent('bofu')" class="filter-btn px-5 py-2 rounded-xl text-sm font-bold text-amber-900/60 hover:text-amber-900 transition-all">BoFu</button>
            </div>
            <button onclick="openEditModal()" class="px-8 py-3 bg-amber-900 text-white rounded-2xl font-bold shadow-xl shadow-amber-900/20 hover:scale-105 active:scale-95 transition-all">
                <i class="fas fa-plus mr-2"></i> Nuevo Item
            </button>
        </div>

        <!-- Content Grid -->
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <!-- Modal Form -->
    <div id="modal-form" class="fixed inset-0 bg-amber-950/80 hidden flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-white rounded-[40px] p-8 md:p-10 max-w-2xl w-full shadow-2xl overflow-y-auto max-h-[90vh] relative">
            <button onclick="closeEditModal()" class="absolute top-6 right-6 text-amber-900/20 hover:text-amber-900 transition-all text-xl"><i class="fas fa-times-circle"></i></button>
            <h2 id="modal-title" class="text-3xl font-bold mb-8 text-amber-900 uppercase tracking-tighter">Detalle de la Idea</h2>
            <form id="post-form" class="space-y-6">
                <input type="hidden" id="post-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-black text-amber-800 uppercase tracking-widest mb-2">Producto</label>
                        <input type="text" id="form-title" class="w-full p-4 rounded-2xl border-2 border-amber-50 focus:border-amber-500 outline-none transition-all bg-amber-50/30">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-amber-800 uppercase tracking-widest mb-2">Formato</label>
                        <select id="form-format" class="w-full p-4 rounded-2xl border-2 border-amber-50 bg-amber-50/30 font-bold">
                            <option value="Reel">Reel Cinematográfico</option>
                            <option value="Carrusel">Carrusel de Valor</option>
                            <option value="Imagen">Imagen Estática</option>
                        </select>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-black text-amber-800 uppercase tracking-widest">Guión y Concepto Creativo</label>
                        <button type="button" onclick="improveWithAI()" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-all">
                            <i class="fas fa-wand-magic-sparkles mr-1"></i> ✨ Mejorar guión con IA
                        </button>
                    </div>
                    <textarea id="form-desc" rows="8" class="w-full p-4 rounded-2xl border-2 border-amber-50 focus:border-amber-500 outline-none transition-all bg-amber-50/30 text-sm italic leading-relaxed"></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 py-4 bg-amber-900 text-white rounded-2xl font-bold shadow-lg hover:bg-black transition-all">Guardar Cambios</button>
                </div>
                <button type="button" id="delete-btn" class="w-full text-red-500 text-xs font-bold uppercase tracking-tighter mt-2 hover:underline hidden">Eliminar</button>
            </form>
        </div>
    </div>

    <!-- AI Generation Loader -->
    <div id="ai-loader" class="fixed inset-0 bg-indigo-950/40 hidden flex items-center justify-center z-[60] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl text-center max-w-sm">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 mx-auto mb-4 ai-loading">
                <i class="fas fa-sparkles text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold text-indigo-900 mb-2">Cocinando ideas ✨</h3>
            <p class="text-indigo-900/60 text-sm">Gemini está redactando una estrategia creativa única para tu marca...</p>
        </div>
    </div>

    <script>
        // Configuración Gemini API
        const apiKey = "";
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let posts = [
            // REELS CONTEMPLATIVOS
            { 
                id: 1, week: 1, type: 'tofu', format: 'Reel', title: 'El Ritual: Chicharrón Personal', 
                desc: 'VISUAL: Empieza con un plano extremadamente cerrado (macro) del chicharrón cayendo sobre el plato. Cámara lenta. \nESTÉTICA: Luz natural de ventana, sombras suaves. \nACCIÓN: Una mano espolvorea un toque de sal o exprime un limón. Se ve el brillo de la grasa dorada. \nAUDIO: Sin música, solo sonido ambiente real (foley) del crujido y el limón. \nTEXTO: "Pequeños placeres que suenan así." \nFINAL: El precio (7.50$) aparece en una esquina elegante.', 
                goal: 'Antojo puro a través de la textura.' 
            },
            { 
                id: 2, week: 2, type: 'tofu', format: 'Reel', title: 'El Mejor Café de Judibana', 
                desc: 'VISUAL: El café cayendo en la taza blanca desde la cafetera. El vapor subiendo lentamente frente a la cámara. \nESTÉTICA: Colores tierra, madera, ambiente acogedor. \nACCIÓN: La cuchara mezclando la espuma, creando un remolino perfecto. \nAUDIO: Una pieza de Jazz suave o Lo-fi muy tranquilo. \nTEXTO: "Hay cosas que no se explican, se sienten. El alma de Judibana está en esta taza." \nFINAL: Logo de Grupo Mi Panadería.', 
                goal: 'Posicionamiento de marca y localidad.' 
            },
            { 
                id: 3, week: 3, type: 'bofu', format: 'Reel', title: 'Arquitectura: Combo Perros', 
                desc: 'VISUAL: Construcción de un perro caliente pieza por pieza en cámara rápida pero fluida (Stop motion). Pan, salchicha, salsas, lluvia de papas. \nESTÉTICA: Fondo color pastel sólido para resaltar los colores de la comida. \nACCIÓN: Al final, aparecen los 4 perros alineados perfectamente. \nAUDIO: Sonidos rítmicos de "pop" cada vez que cae un ingrediente. \nTEXTO: "4 Perros. Una sola decisión. 7$."', 
                goal: 'Venta de combo por volumen visual.' 
            },
            { 
                id: 4, week: 4, type: 'bofu', format: 'Reel', title: 'Gula Elegante: Parripapa', 
                desc: 'VISUAL: Una montaña de papas recién fritas, humeando. La cámara recorre la superficie hasta encontrar los trozos de carne y queso. \nESTÉTICA: Contraste alto, colores vibrantes. \nACCIÓN: Alguien toma una papa con mucho queso fundido estirándose. \nAUDIO: Música "Indie-chill" con buen bajo. \nTEXTO: "La montaña que vale la pena escalar. Parripapa (7.50$)." \nFINAL: Dirección de la tienda.', 
                goal: 'Deseo por abundancia estética.' 
            },
            { 
                id: 5, week: 1, type: 'mofu', format: 'Reel', title: 'Anatomía de la Hamburguesa', 
                desc: 'VISUAL: Primer plano de la carne en la plancha soltando jugos. Luego, el armado lento de la burger del combo de 14$. \nESTÉTICA: Fuego, metal, vapor. Estilo "Chef\'s Table". \nACCIÓN: Se coloca la tapa de pan y se presiona ligeramente para ver la jugosidad. \nAUDIO: Sonido de la plancha (sizzle) mezclado con música cinemática épica pero suave. \nTEXTO: "El equilibrio perfecto no existe... hasta que muerdes esto."', 
                goal: 'Demostrar calidad de ingredientes.' 
            },

            // DÍA DE LAS MADRES
            { 
                id: 6, week: 2, type: 'mofu', format: 'Reel', title: 'El Almuerzo de Papá y Mamá', 
                desc: 'IDEA: Mostrar el montaje del Pabellón Criollo (5.99$). \nSCRIPT: "Hay platos que te devuelven a casa. Nuestro Pabellón es uno de ellos". \nMÚSICA: Folklore venezolano instrumental suave.', 
                goal: 'Vincular el menú con el hogar.' 
            },
            { 
                id: 7, week: 2, type: 'bofu', format: 'Carrusel', title: 'Especial Mamá: Pollo a la Suiza', 
                desc: 'SLIDE 1: Pollo a la Suiza elegante. \nSLIDE 2: Solomo al Ajillo. \nSLIDE 3: Invitación al domingo. \nCOPY: "Consiente a mamá con los sabores que ella ama".', 
                goal: 'Venta especial.' 
            },

            // OTROS POSTS
            { 
                id: 8, week: 1, type: 'mofu', format: 'Carrusel', title: 'Pizza: El Secreto está en la Masa', 
                desc: 'Fotos del proceso artesanal de las pizzas de 4$. Harina, levadura, tiempo y horno de piedra.', 
                goal: 'Confianza.' 
            },
            { 
                id: 9, week: 3, type: 'tofu', format: 'Imagen', title: 'La Arepa Maracucha', 
                desc: 'Foto fija brutal de la Arepa Maracucha abierta. Mucho queso.', 
                goal: 'Atracción.' 
            },
            { 
                id: 10, week: 4, type: 'bofu', format: 'Imagen', title: 'Combo Familiar: Chicharrón 1.2kg', 
                desc: 'Diseño limpio mostrando la tabla de madera con todo el combo de 23$.', 
                goal: 'Venta ticket alto.' 
            }
        ];

        let currentFilter = 'all';

        // Lógica de Gemini AI ✨
        async function callGemini(prompt, systemPrompt = "") {
            document.getElementById('ai-loader').classList.remove('hidden');
            let retries = 0;
            const maxRetries = 5;
            
            while (retries < maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    const result = await response.json();
                    document.getElementById('ai-loader').classList.add('hidden');
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    retries++;
                    await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                }
            }
            document.getElementById('ai-loader').classList.add('hidden');
            alert("La IA está ocupada cocinando otras ideas. Inténtalo de nuevo en un momento.");
            return null;
        }

        async function improveWithAI() {
            const currentDesc = document.getElementById('form-desc').value;
            const productTitle = document.getElementById('form-title').value;
            
            if (!productTitle) return alert("Primero escribe el nombre del producto.");

            const systemPrompt = "Eres un director creativo experto en contenido gastronómico de lujo y contemplativo. Tu estilo es minimalista, enfocado en el detalle visual, ASMR y sensaciones. Escribe en español de Venezuela.";
            const userPrompt = `Mejora este guión para un contenido de Instagram sobre "${productTitle}". El estilo debe ser CONTEMPLATIVO. Descripción actual: ${currentDesc}. Estructura tu respuesta con: VISUAL, ESTÉTICA, ACCIÓN, AUDIO y TEXTO.`;

            const improvedText = await callGemini(userPrompt, systemPrompt);
            if (improvedText) {
                document.getElementById('form-desc').value = improvedText.trim();
            }
        }

        async function generateAIPrompt() {
            const systemPrompt = "Eres un estratega de contenido para 'Grupo Mi Panadería', un local en Judibana que vende desde panadería hasta combos de pollo y chicharrón. Crea UNA idea de post creativa y contemplativa para el mes de Mayo.";
            const userPrompt = "Genera una nueva idea de post (Reel, Carrusel o Imagen) que no hayamos usado antes. Responde solo con un objeto JSON con las propiedades: title, format (Reel/Carrusel/Imagen), type (tofu/mofu/bofu), y desc (descripción detallada y contemplativa).";

            const resultText = await callGemini(userPrompt, systemPrompt);
            if (resultText) {
                try {
                    // Limpiar posible formato markdown de la respuesta
                    const jsonStr = resultText.replace(/```json|```/g, "").trim();
                    const newIdea = JSON.parse(jsonStr);
                    
                    const postToAdd = {
                        id: Date.now(),
                        week: 1,
                        ...newIdea,
                        goal: 'IA Generated ✨'
                    };
                    
                    posts.push(postToAdd);
                    renderPosts();
                    // Scroll a la nueva tarjeta
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } catch (e) {
                    console.error("Error parsing AI response", e);
                    alert("La IA generó una idea pero el formato no fue el correcto. ¡Inténtalo de nuevo!");
                }
            }
        }

        // Funciones de Render y UI
        function renderPosts() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            const filtered = currentFilter === 'all' ? posts : posts.filter(p => p.type === currentFilter);
            filtered.sort((a, b) => a.week - b.week);

            filtered.forEach(post => {
                const isReel = post.format === 'Reel';
                const card = document.createElement('div');
                card.className = `card bg-white p-8 rounded-[32px] border border-amber-100/50 shadow-sm cursor-pointer flex flex-col relative overflow-hidden ${isReel ? 'is-reel shadow-purple-50' : ''}`;
                card.onclick = () => openEditModal(post.id);
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] font-black uppercase text-amber-900/40 tracking-[0.2em]">Semana ${post.week}</span>
                        <span class="px-4 py-1 rounded-full text-[10px] font-black tracking-widest tag-${post.type}">${post.type.toUpperCase()}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-3 text-amber-950 leading-tight">
                        ${post.title} ${post.goal === 'IA Generated ✨' ? '✨' : ''}
                    </h3>
                    <p class="text-xs text-amber-900/60 mb-6 leading-relaxed line-clamp-3 italic">"${post.desc.substring(0, 100)}..."</p>
                    <div class="mt-auto flex items-center justify-between pt-6 border-t border-amber-50">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-amber-50 flex items-center justify-center text-amber-900">
                                <i class="fas ${isReel ? 'fa-play text-[10px]' : (post.format === 'Carrusel' ? 'fa-clone' : 'fa-image')}"></i>
                            </div>
                            <span class="text-[10px] font-bold text-amber-900/40 uppercase">${post.format}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            updateStats();
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = posts.length;
            document.getElementById('stat-reels').innerText = posts.filter(p => p.format === 'Reel').length;
            document.getElementById('stat-tofu').innerText = posts.filter(p => p.type === 'tofu').length;
            document.getElementById('stat-bofu').innerText = posts.filter(p => p.type === 'bofu').length;
        }

        function openEditModal(id = null) {
            const modal = document.getElementById('modal-form');
            const form = document.getElementById('post-form');
            const deleteBtn = document.getElementById('delete-btn');
            form.reset();
            document.getElementById('post-id').value = id || '';
            document.getElementById('modal-title').innerText = id ? 'Refinar Idea' : 'Nuevo Contenido';
            deleteBtn.classList.toggle('hidden', !id);

            if (id) {
                const post = posts.find(p => p.id === id);
                document.getElementById('form-title').value = post.title;
                document.getElementById('form-format').value = post.format;
                document.getElementById('form-desc').value = post.desc;
            }
            modal.classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('modal-form').classList.add('hidden');
        }

        document.getElementById('post-form').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('post-id').value;
            if (id) {
                const post = posts.find(p => p.id === parseInt(id));
                post.title = document.getElementById('form-title').value;
                post.format = document.getElementById('form-format').value;
                post.desc = document.getElementById('form-desc').value;
            } else {
                posts.push({
                    id: Date.now(),
                    week: 1,
                    type: 'mofu',
                    title: document.getElementById('form-title').value,
                    format: document.getElementById('form-format').value,
                    desc: document.getElementById('form-desc').value,
                    goal: 'Manual'
                });
            }
            closeEditModal();
            renderPosts();
        };

        function filterContent(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-amber-900', 'text-white', 'shadow-md');
                btn.classList.add('text-amber-900/60');
            });
            event.currentTarget.classList.add('bg-amber-900', 'text-white', 'shadow-md');
            event.currentTarget.classList.remove('text-amber-900/60');
            renderPosts();
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(posts, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "plan_con_ia_panaderia.json");
            dl.click();
        }

        window.onload = renderPosts;
    </script>
</body>
</html>
